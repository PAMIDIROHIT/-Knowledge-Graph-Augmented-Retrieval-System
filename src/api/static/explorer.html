<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG Knowledge Graph Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #7c3aed;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 500px;
    }

    .search-bar input {
      flex: 1;
      padding: 8px 14px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: #7c3aed; }

    .depth-control {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #a0aec0;
    }

    .depth-control select {
      padding: 6px 10px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }

    button.primary {
      padding: 8px 16px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary:hover { background: #6d28d9; }
    button.primary:disabled { background: #4a5568; cursor: not-allowed; }

    .stats-bar {
      padding: 6px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
      font-size: 12px;
      color: #718096;
      display: flex;
      gap: 20px;
    }

    .stats-bar span { color: #a0aec0; }
    .stats-bar span b { color: #7c3aed; }

    #canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg { width: 100%; height: 100%; }

    .link {
      stroke: #4a5568;
      stroke-opacity: 0.6;
      stroke-width: 1.5;
      marker-end: url(#arrowhead);
    }

    .link:hover { stroke: #a0aec0; stroke-width: 2.5; }

    .node circle {
      stroke: #1a1d27;
      stroke-width: 2;
      cursor: pointer;
      transition: r 0.15s;
    }

    .node circle:hover { stroke-width: 3; }

    .node text {
      font-size: 11px;
      fill: #e2e8f0;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }

    .edge-label {
      font-size: 9px;
      fill: #718096;
      pointer-events: none;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      padding: 10px 14px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      max-width: 280px;
      display: none;
      z-index: 100;
      line-height: 1.5;
    }

    #tooltip .tooltip-title { font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
    #tooltip .tooltip-type { color: #7c3aed; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    #tooltip .tooltip-desc { color: #a0aec0; margin-top: 4px; }
    #tooltip .tooltip-rel { color: #68d391; font-size: 11px; margin-top: 4px; }

    /* Legend */
    #legend {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
    }

    #legend h3 { color: #a0aec0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: #e2e8f0;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      color: #718096;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #4a5568;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>⚡ GraphRAG Explorer</h1>
  <div class="search-bar">
    <input id="entity-input" type="text" placeholder="Search entity (e.g. Microsoft, Satya Nadella)…" />
    <div class="depth-control">
      <label for="depth-select">Depth</label>
      <select id="depth-select">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
    <button class="primary" id="explore-btn" onclick="exploreEntity()">Explore</button>
  </div>
</header>

<div class="stats-bar">
  <span>Nodes: <b id="stat-nodes">0</b></span>
  <span>Edges: <b id="stat-edges">0</b></span>
  <span>Center: <b id="stat-center">—</b></span>
  <span>API: <b id="stat-api">http://localhost:8000</b></span>
</div>

<div id="canvas">
  <svg id="graph-svg">
    <defs>
      <marker id="arrowhead" viewBox="0 -4 10 8" refX="20" refY="0"
              markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,-4L10,0L0,4" fill="#4a5568" />
      </marker>
    </defs>
    <g id="zoom-layer"></g>
  </svg>

  <div id="tooltip"></div>

  <div id="legend">
    <h3>Entity Types</h3>
    <div id="legend-items"></div>
  </div>

  <div id="status">Ready — enter an entity name to begin</div>
</div>

<script>
// ─── Configuration ───────────────────────────────────────────────────────────
const API_BASE = window.location.origin.replace(/:\d+$/, ':8000');

const TYPE_COLORS = {
  ORGANIZATION:    '#7c3aed',
  PERSON:          '#2563eb',
  LOCATION:        '#059669',
  PRODUCT:         '#d97706',
  EVENT:           '#dc2626',
  FINANCIAL_METRIC:'#0891b2',
  DATE:            '#7c3aed',
  TECHNOLOGY:      '#9333ea',
  COMMUNITY:       '#64748b',
  OTHER:           '#475569',
};

function nodeColor(d) {
  return TYPE_COLORS[d.type] || TYPE_COLORS.OTHER;
}

function nodeRadius(d) {
  return d.id === centerEntityId ? 18 : 12;
}

// ─── State ───────────────────────────────────────────────────────────────────
let simulation = null;
let centerEntityId = null;

// ─── D3 Setup ────────────────────────────────────────────────────────────────
const svg = d3.select('#graph-svg');
const zoomLayer = svg.select('#zoom-layer');

const zoom = d3.zoom()
  .scaleExtent([0.1, 4])
  .on('zoom', (event) => {
    zoomLayer.attr('transform', event.transform);
  });

svg.call(zoom);

// Build legend
const legendContainer = document.getElementById('legend-items');
Object.entries(TYPE_COLORS).forEach(([type, color]) => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${type}`;
  legendContainer.appendChild(div);
});

// ─── Tooltip helpers ─────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showNodeTooltip(event, d) {
  tooltip.style.display = 'block';
  tooltip.style.left = (event.pageX + 16) + 'px';
  tooltip.style.top  = (event.pageY - 8) + 'px';
  tooltip.innerHTML = `
    <div class="tooltip-type">${d.type || 'ENTITY'}</div>
    <div class="tooltip-title">${d.name || d.id}</div>
    ${d.description ? `<div class="tooltip-desc">${d.description}</div>` : ''}
    <div class="tooltip-desc" style="margin-top:6px;color:#718096">ID: ${d.id}</div>
  `;
}

function showEdgeTooltip(event, d) {
  tooltip.style.display = 'block';
  tooltip.style.left = (event.pageX + 16) + 'px';
  tooltip.style.top  = (event.pageY - 8) + 'px';
  tooltip.innerHTML = `
    <div class="tooltip-rel">⟶ ${d.relation_type}</div>
    ${d.description ? `<div class="tooltip-desc">${d.description}</div>` : ''}
    <div class="tooltip-desc">Confidence: ${(d.confidence || 0).toFixed(2)}</div>
  `;
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ─── Core render function ────────────────────────────────────────────────────
function renderGraph(nodes, edges, centerEntity) {
  const width  = document.getElementById('canvas').clientWidth;
  const height = document.getElementById('canvas').clientHeight;

  zoomLayer.selectAll('*').remove();
  if (simulation) simulation.stop();

  // Deduplicate nodes
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const uniqueNodes = Array.from(nodeMap.values());

  // Filter edges where both endpoints exist
  const validEdges = edges.filter(e =>
    nodeMap.has(e.source) && nodeMap.has(e.target)
  );

  // D3 force simulation
  simulation = d3.forceSimulation(uniqueNodes)
    .force('link', d3.forceLink(validEdges).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 8));

  // Edges
  const linkGroup = zoomLayer.append('g').attr('class', 'links');
  const link = linkGroup.selectAll('line')
    .data(validEdges)
    .join('line')
    .attr('class', 'link')
    .on('mouseover', showEdgeTooltip)
    .on('mousemove', (e, d) => {
      tooltip.style.left = (e.pageX + 16) + 'px';
      tooltip.style.top  = (e.pageY - 8)  + 'px';
    })
    .on('mouseout', hideTooltip);

  // Edge labels
  const edgeLabelGroup = zoomLayer.append('g').attr('class', 'edge-labels');
  const edgeLabel = edgeLabelGroup.selectAll('text')
    .data(validEdges)
    .join('text')
    .attr('class', 'edge-label')
    .text(d => d.relation_type || '');

  // Nodes
  const nodeGroup = zoomLayer.append('g').attr('class', 'nodes');
  const node = nodeGroup.selectAll('g')
    .data(uniqueNodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x; d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    )
    .on('mouseover', showNodeTooltip)
    .on('mousemove', (e, d) => {
      tooltip.style.left = (e.pageX + 16) + 'px';
      tooltip.style.top  = (e.pageY - 8)  + 'px';
    })
    .on('mouseout', hideTooltip)
    .on('dblclick', (event, d) => {
      // Double-click expands a node
      document.getElementById('entity-input').value = d.name || d.id;
      exploreEntity();
    });

  node.append('circle')
    .attr('r', d => nodeRadius(d))
    .style('fill', d => nodeColor(d));

  node.append('text')
    .attr('dy', d => nodeRadius(d) + 14)
    .attr('text-anchor', 'middle')
    .text(d => (d.name || d.id).slice(0, 20));

  // Pin center node
  if (centerEntity) {
    const centerNode = uniqueNodes.find(n => n.id === centerEntity);
    if (centerNode) {
      centerNode.fx = width / 2;
      centerNode.fy = height / 2;
    }
  }

  // Tick update
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    edgeLabel
      .attr('x', d => ((d.source.x || 0) + (d.target.x || 0)) / 2)
      .attr('y', d => ((d.source.y || 0) + (d.target.y || 0)) / 2);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Update stats
  document.getElementById('stat-nodes').textContent = uniqueNodes.length;
  document.getElementById('stat-edges').textContent = validEdges.length;
  document.getElementById('stat-center').textContent =
    uniqueNodes.find(n => n.id === centerEntity)?.name || centerEntity || '—';
}

// ─── API call ────────────────────────────────────────────────────────────────
async function exploreEntity() {
  const name  = document.getElementById('entity-input').value.trim();
  const depth = parseInt(document.getElementById('depth-select').value, 10);
  if (!name) return;

  const btn = document.getElementById('explore-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Loading…';
  setStatus('Fetching graph for: ' + name);

  try {
    const url = `${API_BASE}/graph/explore?entity_name=${encodeURIComponent(name)}&depth=${depth}`;
    const response = await fetch(url);
    if (!response.ok) {
      const err = await response.json().catch(() => ({ detail: response.statusText }));
      throw new Error(err.detail || response.statusText);
    }
    const data = await response.json();
    centerEntityId = data.center_entity;
    renderGraph(data.nodes, data.edges, data.center_entity);
    setStatus(`Loaded ${data.nodes.length} nodes, ${data.edges.length} edges for "${name}"`);
  } catch (err) {
    setStatus('Error: ' + err.message, true);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Explore';
  }
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? '#fc8181' : '#718096';
}

// Enter key triggers search
document.getElementById('entity-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') exploreEntity();
});

// Initial: fetch a sample entity to show something on load
window.addEventListener('load', async () => {
  try {
    const health = await fetch(`${API_BASE}/health`).then(r => r.json());
    if (health.graph_node_count > 0) {
      setStatus(`Graph loaded: ${health.graph_node_count} nodes, ${health.graph_edge_count} edges`);
    } else {
      setStatus('No graph data yet. Run the DVC pipeline first: dvc repro');
    }
  } catch {
    setStatus('API not reachable at ' + API_BASE + ' — start with: docker-compose up', true);
  }
});
</script>
</body>
</html>
